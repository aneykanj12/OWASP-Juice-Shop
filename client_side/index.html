<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
    <title>Juice Shop Login</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="page-wrapper">
      <div class="login-card">
        <div class="tab-row">
          <button id="loginTab" class="tab-button active" type="button">Log in</button>
          <button id="createTab" class="tab-button" type="button">Create account</button>
        </div>

        <div id="loginView">
          <h1>Login</h1>
          <p class="subtitle">Sign in to your Juice Shop account</p>

          <form id="loginForm">
            <div class="input-group">
              <label for="loginEmail">Email</label>
              <input id="loginEmail" type="text" name="email" placeholder="Enter your email">
            </div>

            <div class="input-group">
              <label for="loginPassword">Password</label>
              <input id="loginPassword" type="password" name="password" placeholder="Enter your password">
            </div>

            <button class="main-button" type="submit">Log in</button>
          </form>
        </div>

        <div id="createView" class="hidden">
          <h1>Create Account</h1>
          <p class="subtitle">Create a local account for this demo</p>

          <form id="createForm">
            <div class="input-group">
              <label for="createDisplayName">Display Name</label>
              <input id="createDisplayName" type="text" name="displayName" placeholder="Enter your display name">
            </div>

            <div class="input-group">
              <label for="createEmail">Email</label>
              <input id="createEmail" type="text" name="email" placeholder="Enter your email">
            </div>

            <div class="input-group">
              <label for="createPassword">Password</label>
              <input id="createPassword" type="password" name="password" placeholder="Create a password">
            </div>

            <button class="main-button" type="submit">Create account</button>
          </form>
        </div>

        <p id="message"></p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
